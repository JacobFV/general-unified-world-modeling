# General Unified World Model — Training Curriculum
#
# This YAML file specifies the full training DAG as a sequence of stage groups.
# Each group forks into parallel stages (trained simultaneously),
# then joins (weight averaging) before the next group.
#
# Each stage describes what to train. Stages can provide explicit
# `include` paths for the world model fields to include on the canvas.
#
# Usage:
#   from general_unified_world_model.training.dag_curriculum import (
#       CurriculumSpec, DAGCurriculumTrainer,
#   )
#   spec = CurriculumSpec.from_yaml("examples/curriculum.yaml")
#   nodes = spec.to_training_nodes()
#   trainer = DAGCurriculumTrainer(nodes=nodes, ...)
#   trainer.run()

name: general_unified_world_model_v1

defaults:
  H: 48
  W: 48
  d_model: 64
  n_layers: 6
  n_loops: 3
  n_steps: 5000
  lr: 0.0001
  batch_size: 32

plan:
  # ── Group 1: Foundations ──────────────────────────────────────────
  # Six parallel foundation models, each learning one domain.
  # No parent weights — these start from random initialization.
  - name: foundations
    stages:
      - description: "Core financial markets: yield curves, credit spreads, equity indices, FX, derivatives pricing"
        datasets: [yahoo_finance, fred_rates]

      - description: "US macroeconomic fundamentals: GDP, inflation, employment, housing, fiscal policy"
        datasets: [fred_macro]

      - description: "Political systems, governance, and geopolitical dynamics"

      - description: "Natural resources, energy markets, and commodity supply chains"
        datasets: [yahoo_commodities]

      - description: "Technology frontier: AI capabilities, semiconductor production, biotech advances"

      - description: "Media narratives, investor positioning, and public sentiment"
        datasets: [news_embeddings]

  # ── Group 2: Cross-Domain ────────────────────────────────────────
  # Three parallel models that combine foundation domains.
  # Each starts from the merged weights of all foundation models.
  - name: cross_domain
    builds_on: foundations
    stages:
      - description: "How macroeconomic conditions drive financial markets: GDP growth affects equities, inflation moves rates, employment drives credit"
        datasets: [fred_macro, fred_rates, yahoo_finance]
        n_layers: 8
        H: 64
        W: 64

      - description: "Geopolitical events driving commodity prices: sanctions on oil, trade wars on metals, conflict on food"
        datasets: [yahoo_commodities]

      - description: "How media narratives and sentiment drive market dynamics: media tone to equity flows, positioning to volatility"
        datasets: [yahoo_finance, news_embeddings]

  # ── Group 3: Complex Dynamics ────────────────────────────────────
  # Two parallel models for higher-order dynamics.
  - name: complex_dynamics
    builds_on: cross_domain
    stages:
      - description: "Corporate strategy and decision-making in macroeconomic context"
        datasets: [yahoo_finance, fred_macro]
        n_layers: 8
        H: 64
        W: 64

      - description: "Policy analysis: monetary policy transmission, fiscal stimulus multipliers, regulatory impact on markets"
        datasets: [fred_macro, fred_rates, yahoo_finance]
        n_layers: 8
        H: 64
        W: 64

  # ── Group 4: Full Integration ────────────────────────────────────
  # Single model that brings everything together.
  - name: integration
    builds_on: complex_dynamics
    stages:
      - description: "Full world model integration: all domains on one canvas"
        include: ["*"]
        datasets: [yahoo_finance, fred_macro, fred_rates, yahoo_commodities]
        n_layers: 12
        H: 128
        W: 128
        n_steps: 10000
