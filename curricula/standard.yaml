name: general_unified_world_model

# Canvas dimensions (H, W) are auto-computed from the projected fields.
# Override per-stage only when you need a specific grid size.
defaults:
  d_model: 64
  n_layers: 6
  n_loops: 3
  n_steps: 5000
  lr: 0.0001
  batch_size: 32

plan:
  - name: foundations
    stages:
      - description: "Core financial markets: yield curves, credit spreads, equity indices, FX, derivatives pricing"
        datasets: [yahoo_finance, fred_rates]

      - description: "US macroeconomic fundamentals: GDP, inflation, employment, housing, fiscal policy"
        datasets: [fred_macro]

      - description: "Political systems, governance, and geopolitical dynamics"

      - description: "Natural resources, energy markets, and commodity supply chains"
        datasets: [yahoo_commodities]

      - description: "Technology frontier: AI, semiconductors, biotech, quantum computing"

      - description: "Media narratives, investor positioning, and public sentiment"
        datasets: [news_embeddings]

  - name: cross_domain
    builds_on: foundations
    stages:
      - description: "How macroeconomic conditions drive financial markets: GDP to equities, inflation to rates"
        datasets: [fred_macro, fred_rates, yahoo_finance]
        n_layers: 8

      - description: "Geopolitical events driving commodity prices: sanctions to oil, trade wars to metals"
        datasets: [yahoo_commodities]

      - description: "How media narratives and sentiment drive market dynamics"
        datasets: [yahoo_finance, news_embeddings]

  - name: complex_dynamics
    builds_on: cross_domain
    stages:
      - description: "Corporate strategy and decision-making in macroeconomic context"
        datasets: [yahoo_finance, fred_macro]
        n_layers: 8

      - description: "Policy analysis: monetary transmission, fiscal multipliers, regulatory impact on markets"
        datasets: [fred_macro, fred_rates, yahoo_finance]
        n_layers: 8

  - name: integration
    builds_on: complex_dynamics
    stages:
      - description: "Full world model: all domains integrated, regime state receives gradient from everything"
        include: ["*"]
        datasets: [yahoo_finance, fred_macro, fred_rates, yahoo_commodities]
        n_layers: 12
        n_steps: 10000
